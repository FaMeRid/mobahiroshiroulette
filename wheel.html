:root{

/* NIGHT THEME */

--bg-main:#030714;
--bg-secondary:#050d22;

--neon-cyan:#00fff5;
--neon-purple:#a855ff;
--gold:#ffd700;

--text-main:#e0ffff;
--text-dim:#7aa5ff;

--glow-cyan:0 0 20px #00fff5,0 0 60px rgba(0,255,245,0.5);
--glow-gold:0 0 20px #ffd700,0 0 60px rgba(255,215,0,0.4);

--card-bg:#0b0f1d;

--wheel-dark:#0d1225;
--wheel-light:#02040a;

}

/* ===== LIGHT THEME ===== */

body.light-theme{

--bg-main:#f4f7ff;
--bg-secondary:#ffffff;

--neon-cyan:#0096ff;
--neon-purple:#7a5cff;
--gold:#c89b3c;

--text-main:#1c1c1c;
--text-dim:#555;

--glow-cyan:0 0 15px #4db8ff;
--glow-gold:0 0 20px #c89b3c;

--card-bg:#ffffff;

--wheel-dark:#e8ecff;
--wheel-light:#ffffff;

}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: var(--bg-color);
  color: var(--text-color);
  font-family: Orbitron, sans-serif;
  overflow: hidden;
  transition: background 0.5s, color 0.5s;
}
header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(3,7,20,0.88);
  backdrop-filter: blur(14px);
  padding: 1.2rem 3rem;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  border-bottom: 1px solid rgba(0,255,245,0.2);
}
body.light-theme header { background: rgba(255,255,255,0.9); border-bottom: 1px solid rgba(0,0,0,0.1);}
.logo{

font-size:clamp(2.6rem,6vw,3.8rem);

background:linear-gradient(
90deg,
#ffd700,
#fff6a0,
#ffd700,
#ffae00
);

background-size:300%;

-webkit-background-clip:text;
color:transparent;

animation:logoFlow 6s linear infinite;

letter-spacing:6px;

}

@keyframes logoFlow{

0%{background-position:0%;}
100%{background-position:300%;}

}
body.light-theme .logo { color:#333; text-shadow:none; }
.social-icons { display:flex; gap:2rem; }
.social-icon { font-size:2.6rem; color:var(--neon-cyan); transition: all 0.5s ease; text-shadow:0 0 20px var(--shadow-neon);}
body.light-theme .social-icon { color:#007bff; text-shadow:none; }
.social-icon:hover { transform: translateY(-12px) scale(1.4) rotate(15deg); color: var(--gold); text-shadow: 0 0 40px var(--gold);}
#theme-toggle { background:none; border:none; font-size:2rem; color:var(--neon-cyan); cursor:pointer; margin-left:1rem;}
body.light-theme #theme-toggle { color:#ffcc00; }

.container { display:flex; height:100vh; align-items:center; justify-content:space-between; padding:0 120px; padding-top:80px; }
#wheelArea{ width:800px; height:800px; overflow:hidden; position:relative; border-radius:450px; }
#wheel { width:100%; height:100%; border-radius:50%; background: radial-gradient(circle,var(--wheel-bg),var(--wheel-alt)); box-shadow:0 0 30px var(--gold),0 0 120px rgba(255,215,0,.4), inset 0 0 80px rgba(0,0,0,.9); transform-style: preserve-3d; filter: drop-shadow(0 0 40px gold); position:absolute; left:-450px; }
.arrow{

position:absolute;
left:calc(37%);
top:50%;

transform:translateX(-50%);

width:0;
height:0;

border-top:50px solid transparent;
border-bottom:50px solid transparent;
border-right:70px solid gold;

filter:

drop-shadow(0 0 20px gold)
drop-shadow(0 0 40px rgba(255,215,0,0.8));

}
#buildOverlay { position: fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:200; opacity:0; transition:0.5s; }
body.light-theme #buildOverlay { background:rgba(255,255,255,0.9);}
#buildOverlay.visible { display:flex; opacity:1; }
#buildContent { background:var(--card-bg); padding:40px 60px; border-radius:24px; box-shadow:0 0 60px var(--gold); max-width:90vw; max-height:80vh; overflow-y:auto; color:var(--gold); font-family:'Orbitron',monospace; text-align:center; }
#closeBuild { position:absolute; top:24px; right:24px; background:none; border:none; font-size:2.4rem; color:var(--gold); cursor:pointer; filter:drop-shadow(0 0 6px var(--gold)); transition:color 0.3s;}
#closeBuild:hover { color:#fff; }
#lever{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:160px;
height:260px;
cursor:pointer;
display:flex;
justify-content:center;
align-items:flex-end;
}

/* база */
.lever-base{

position:absolute;
bottom:0;

width:140px;
height:50px;

border-radius:14px;

background:linear-gradient(145deg,#555,#111);

box-shadow:
inset 0 0 12px #000,
0 0 25px rgba(0,0,0,0.8);

}

/* ручка */
.lever-arm{

position:absolute;
bottom:30px;

display:flex;
flex-direction:column;
align-items:center;

transform-origin:bottom;
transition:transform .25s ease;

}

/* красная ручка */
.lever-knob{

width:40px;
height:40px;

border-radius:50%;

margin-top:8px;

background:radial-gradient(
circle at 30% 30%,
#ff7070,
#b30000
);

box-shadow:
0 0 25px red,
0 0 50px rgba(255,0,0,.7),
inset 0 0 8px rgba(0,0,0,.7);

}

/* металлическая палка */
.lever-stick{

width:20px;
height:150px;

background:linear-gradient(
180deg,
#e5e5e5,
#777
);

border-radius:6px;

box-shadow:
inset 0 0 6px #000,
0 0 10px rgba(255,255,255,0.3);

}

/* анимация */
#lever.pull .lever-arm{
animation: leverPull 0.6s ease;
}

@keyframes leverPull{

0%{transform:rotate(0deg)}
25%{transform:rotate(60deg)}
50%{transform:rotate(35deg)}
75%{transform:rotate(48deg)}
100%{transform:rotate(0deg)}

}
#lever:hover .lever-ball{
box-shadow:
0 0 30px red,
0 0 60px red;
}
@keyframes leverPull{

0%{
transform:rotate(0deg);
}

20%{
transform:rotate(55deg); /* мощный рывок вниз */
}

40%{
transform:rotate(30deg); /* отдача вверх */
}

60%{
transform:rotate(45deg); /* вторая тряска */
}

80%{
transform:rotate(35deg);
}

100%{
transform:rotate(0deg); /* возвращается */
}

}
#lever.pull{
animation: leverShake 0.65s;
}

@keyframes leverShake{

0%{transform:translateX(-50%) translateY(0)}
20%{transform:translateX(-50%) translateY(4px)}
40%{transform:translateX(-50%) translateY(-3px)}
60%{transform:translateX(-50%) translateY(3px)}
80%{transform:translateX(-50%) translateY(-2px)}
100%{transform:translateX(-50%) translateY(0)}

}
#showBuildBtn{ position:absolute; bottom:20px; left:50%; transform:translateX(-50%); padding:10px 30px; font-family:Orbitron; font-size:20px; border:none; border-radius:12px; cursor:pointer; background:var(--gold); color:#000; box-shadow:0 0 20px var(--gold); transition:.3s;}
#showBuildBtn:hover{ transform:translateX(-50%) scale(1.05); box-shadow:0 0 40px var(--gold);}
#wheelMenu{ position:absolute; right:80px; top:200px; display:flex; flex-direction:column; gap:15px;}
#wheelMenu button{

padding:14px 30px;

font-family:Orbitron;
font-weight:700;

border-radius:14px;

background:

linear-gradient(
145deg,
rgba(40,40,60,0.7),
rgba(10,10,20,0.9)
);

border:1px solid rgba(255,215,0,0.4);

color:gold;

backdrop-filter:blur(10px);

transition:all .35s;

box-shadow:

0 0 10px rgba(255,215,0,0.2);

}

#wheelMenu button:hover{

transform:translateY(-5px) scale(1.05);

box-shadow:

0 0 20px gold,
0 0 40px rgba(255,215,0,0.4);

background:linear-gradient(
145deg,
#ffd700,
#ffae00
);

color:black;

}
#centerWinner{ position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); text-align:center; z-index:150; pointer-events:none; opacity:0; transition:opacity 1s ease;}
#centerWinner img{ width:260px; filter:drop-shadow(0 0 30px gold);}
#centerWinner h2{ font-size:48px; color:gold; margin-top:15px;}
@media (max-width:768px){ #wheelArea{ width:100vw; height:100vw; transform:translateX(0); } .container{ flex-direction:column; padding:0 20px; padding-top:100px; } #wheelMenu{ right:20px; top:120px; } }
#centerWinner video {
  max-width: 500px;
  border-radius: 20px;
  box-shadow: 0 0 40px gold, 0 0 80px #ffdd00;
  animation: winnerPop 0.8s ease-out;
}

@keyframes winnerPop {
  0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
/* ===== GAME LOBBY BACKGROUND ===== */

body{

background:
radial-gradient(circle at 20% 30%, rgba(0,255,255,0.12), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,215,0,0.12), transparent 40%),
linear-gradient(160deg,var(--bg-main),var(--bg-secondary));

color:var(--text-main);

transition:background 0.6s,color 0.6s;

}

/* движущаяся дымка */
body::before{
content:"";
position:fixed;
inset:0;

background:
url("assets/bg/stars.png"),
radial-gradient(circle at 20% 30%, rgba(0,255,255,0.1), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,215,0,0.1), transparent 40%);

background-size:cover;

animation: starMove 120s linear infinite;

z-index:-3;
}

@keyframes starMove{
0%{transform:translateY(0);}
100%{transform:translateY(-200px);}
}
body::after{

content:"";

position:fixed;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:

radial-gradient(circle,rgba(255,215,0,0.05),transparent 60%),
radial-gradient(circle,rgba(0,255,255,0.05),transparent 60%);

animation:lightMove 20s linear infinite;

pointer-events:none;

z-index:-2;

}

@keyframes lightMove{

0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}

}
#particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
z-index:-1;
}
#wheel{
animation:wheelPulse 4s infinite ease-in-out;
}

@keyframes wheelPulse{
0%{filter:drop-shadow(0 0 20px gold);}
50%{filter:drop-shadow(0 0 60px gold);}
100%{filter:drop-shadow(0 0 20px gold);}
}

let items = heroes;
let visibleItems = [];
const MAX_VISIBLE = 22;

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const center = canvas.width / 2;
const radius = canvas.width * 0.48;

let rotation = 0;
let speed = 0;
let lastTick = -1;
let spinning = false;
let winner = null;
let buildData = [];

// Кэш изображений
const imageCache = {};
function preloadImages(list) {
  list.forEach(item => {
    if (!item.img) return;
    const img = new Image();
    img.src = item.img;
    imageCache[item.img] = img;
  });
}
preloadImages(heroes);
preloadImages(spells);
preloadImages(lanes);
preloadImages(emblems);

function generateWheel() {
  const shuffled = [...items].sort(() => Math.random() - 0.5);
  visibleItems = shuffled.slice(0, MAX_VISIBLE);
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const sectors = visibleItems.length;
  if (!sectors) return;
  const angle = (Math.PI * 2) / sectors;
  const iconSize = Math.min(120, radius * 1.8 / sectors);

  for (let i = 0; i < sectors; i++) {
    const a = i * angle + rotation;
    const item = visibleItems[i];

    ctx.beginPath();
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, a, a + angle);
    ctx.closePath();

    switch (item.rarity) {
      case "Common": ctx.fillStyle = "#444"; break;
      case "Rare": ctx.fillStyle = "#3f6f88"; break;
      case "Epic": ctx.fillStyle = "#6a4b7a"; break;
      case "Legendary": ctx.fillStyle = "#8a7a2f"; break;
      case "Mythic": ctx.fillStyle = "#7a3b3b"; break;
      default: ctx.fillStyle = "#333";
    }
    ctx.fill();
    ctx.strokeStyle = "gold";
    ctx.lineWidth = 3;
    ctx.stroke();

    const icon = imageCache[item.img];
    if (icon && icon.complete) {
      ctx.save();
      ctx.translate(center, center);
      ctx.rotate(a + angle / 2);
      const dist = radius * 0.68;
      ctx.translate(dist, 0);
      ctx.rotate(-(a + angle / 2));
      ctx.drawImage(icon, -iconSize / 2, -iconSize / 2, iconSize, iconSize);
      ctx.restore();
    }
  }
}

function animate() {
  if (spinning) {
    if(Math.random()<0.2) spawnSpark();
    rotation += speed;
    speed *= 0.982;

    const sectors = visibleItems.length;
    const angle = (Math.PI * 2) / sectors;
    const pointerAngle = (Math.PI - rotation + Math.PI * 2) % (Math.PI * 2);
    const currentSector = Math.floor(pointerAngle / angle);

    if (currentSector !== lastTick && speed > 0.015) {
      tickSound.currentTime = 0;
      tickSound.play().catch(() => {});
      lastTick = currentSector;
    }

    if (speed < 0.003) {
  spinning = false;

  // Нормализуем угол поворота колеса
  let normalizedRotation = rotation % (Math.PI * 2);
  if (normalizedRotation < 0) normalizedRotation += Math.PI * 2;

  // Стрелка указывает ВЛЕВО (на 0 градусов в canvas-координатах)
  // Поэтому сектор под стрелкой — это тот, чей центр находится около 0 радиан относительно стрелки
  const arrowAngle = 0; // стрелка смотрит влево (0 радиан)

  // Угол сектора, на который указывает стрелка после поворота колеса
  const pointedAngle = (arrowAngle - normalizedRotation + Math.PI * 2) % (Math.PI * 2);

  // Находим индекс сектора (сектор начинается с 0)
  const winnerSector = Math.floor(pointedAngle / angle) % sectors;

  winner = visibleItems[winnerSector];
  // Плавный snap к центру сектора под стрелкой
const targetRotation = normalizedRotation + (pointedAngle - (winnerSector * angle + angle / 2));
rotation = targetRotation;
  showWinner();
}
  }
  draw();
  requestAnimationFrame(animate);
}

function showWinner() {
  if (!winner) return;

  const centerEl = document.getElementById('centerWinner');

  if (winner.video) {

    centerEl.innerHTML = `

    `;

    const video = document.getElementById("winnerVideo");

    video.addEventListener("loadedmetadata", () => {

      const duration = video.duration * 1000;

      setTimeout(nextStage, duration);

    });

  } else {

    centerEl.innerHTML = `
      <img src="${winner.img}" alt="${winner.name}">
      <h2>${winner.name}</h2>
    `;

    setTimeout(nextStage, 5000); // картинка показывается 5 сек
  }

  centerEl.style.opacity = '1';


  function nextStage(){
    centerEl.style.opacity = '0';
    stage = (stage + 1) % 4;
    setWheel(wheelOrder[stage]);

  else if (items === spells) currentBuild.spell = winner;
  else if (items === lanes) currentBuild.lane = winner;
  else if (items === emblems) currentBuild.emblem = winner;

  if (!Array.isArray(buildData)) buildData = [];

  if (
    buildData.length === 0 ||

     buildData[buildData.length-1].spell &&
     buildData[buildData.length-1].lane &&

    buildData.push({});
  }

  Object.assign(buildData[buildData.length-1], currentBuild);
  localStorage.setItem("mlbb_builds", JSON.stringify(buildData));
}
function setWheel(type) {

  else if (type === "spells") items = spells;

  localStorage.setItem('wheelType', type);
  generateWheel();
  rotation = 0;
  draw();
}

          </td>

            ${build.spell ? `<img src="${build.spell.img}" style="width:50px; vertical-align:middle; margin-right:10px;">${build.spell.name}` : '-'}
          </td>
          <td style="padding:12px;">
            ${build.lane ? `<img src="${build.lane.img}" style="width:50px; vertical-align:middle; margin-right:10px;">${build.lane.name}` : '-'}
          </td>
          <td style="padding:12px;">
            ${build.emblem ? `<img src="${build.emblem.img}" style="width:50px; vertical-align:middle; margin-right:10px;">${build.emblem.name}` : '-'}
          </td>
        </tr>
      `;
    });
  }

  tableHTML += `</tbody></table>`;

  document.getElementById('buildContent').innerHTML = tableHTML;
  document.getElementById('buildOverlay').classList.add('visible');
}

particles.push({

y:Math.random()*particleCanvas.height,
size:Math.random()*2+1,
speed:Math.random()*0.3+0.1
});
}

function animateParticles(){

pctx.clearRect(0,0,particleCanvas.width,particleCanvas.height);

particles.forEach(p=>{
p.y -= p.speed;

if(p.y < 0){
p.y = particleCanvas.height;
p.x = Math.random()*particleCanvas.width;
}

pctx.beginPath();
pctx.arc(p.x,p.y,p.size,0,Math.PI*2);
pctx.fillStyle="rgba(0,255,255,0.6)";
pctx.fill();
});

requestAnimationFrame(animateParticles);
}
