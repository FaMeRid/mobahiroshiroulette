<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Твой билд — MOBAHIROSHI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --cyan:   #00fff5;
      --gold:   #ffd700;
      --purple: #a855ff;
      --dark:   #030714;
      --glow-c: rgba(0,255,245,0.8);
      --glow-g: rgba(255,215,0,0.8);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background: var(--dark);
      color: #e0ffff;
      font-family: 'Exo 2', sans-serif;
      opacity: 0;
      transition: opacity 0.9s ease;
      text-align: center;
    }
    body.loaded { opacity: 1; }

    /* VIDEO BG */
    #bg-video {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.1; z-index: 0;
      pointer-events: none;
      animation: bgScale 25s ease-in-out infinite alternate;
    }
    @keyframes bgScale { from { transform: scale(1.05); } to { transform: scale(1.18); } }

    #grid-canvas {
      position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.22;
    }
    #particle-canvas {
      position: fixed; inset: 0; z-index: 2; pointer-events: none;
    }

    .bg-glow {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 0%, rgba(0,255,245,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(168,85,255,0.12) 0%, transparent 60%);
      pointer-events: none; z-index: 3;
    }
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
      pointer-events: none; z-index: 4;
    }
    .vignette {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
      pointer-events: none; z-index: 5;
    }

    /* HUD CORNERS */
    .hud-corner {
      position: fixed; width: 80px; height: 80px;
      z-index: 50; pointer-events: none;
      opacity: 0; animation: hudFade 1s ease-out forwards 1.5s;
    }
    @keyframes hudFade { to { opacity: 1; } }
    .hud-corner::before, .hud-corner::after {
      content: ""; position: absolute;
      background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
    }
    .hud-corner::before { width: 2px; height: 30px; }
    .hud-corner::after  { width: 30px; height: 2px; }
    .hud-tl { top:16px; left:16px; }
    .hud-tl::before { top:0; left:0; } .hud-tl::after { top:0; left:0; }
    .hud-tr { top:16px; right:16px; transform: scaleX(-1); }
    .hud-tr::before { top:0; left:0; } .hud-tr::after { top:0; left:0; }
    .hud-bl { bottom:16px; left:16px; transform: scaleY(-1); }
    .hud-bl::before { top:0; left:0; } .hud-bl::after { top:0; left:0; }
    .hud-br { bottom:16px; right:16px; transform: scale(-1); }
    .hud-br::before { top:0; left:0; } .hud-br::after { top:0; left:0; }

    /* HEADER */
    header {
      position: fixed; top: 0; width: 100%;
      background: rgba(3,7,20,0.88); backdrop-filter: blur(14px);
      padding: 1.2rem 3rem;
      display: flex; justify-content: space-between; align-items: center;
      z-index: 100; border-bottom: 1px solid rgba(0,255,245,0.2);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 900; letter-spacing: 5px;
      background: linear-gradient(90deg, #ffae00, #fffde0, #ffd700, #ffae00);
      background-size: 300%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoFlow 7s linear infinite;
    }
    @keyframes logoFlow { 0% { background-position: 0%; } 100% { background-position: 300%; } }
    .social-icons { display: flex; gap: 2rem; }
    .social-icon {
      font-size: 2.2rem; color: var(--cyan);
      transition: all 0.4s ease; text-shadow: 0 0 18px var(--glow-c);
    }
    .social-icon:hover {
      transform: translateY(-10px) scale(1.35) rotate(12deg);
      color: var(--gold); text-shadow: 0 0 35px var(--glow-g);
    }

    /* MAIN */
    .result-main {
      position: relative; z-index: 20;
      padding: 150px 20px 100px;
    }

    /* TITLE */
    .result-title-wrap {
      opacity: 0;
      transform: translateY(36px);
      animation: revealUp 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
      margin-bottom: 4rem;
    }
    @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }
    h1.result-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ffae00 0%, #fffde0 45%, #ffd700 55%, #ffae00 100%);
      background-size: 300%;
      -webkit-background-clip: text; background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleShine 10s linear infinite 1s;
      letter-spacing: 3px;
    }
    @keyframes titleShine { 0% { background-position: 0%; } 100% { background-position: 300%; } }
    .title-bar {
      height: 3px; width: 0;
      background: linear-gradient(90deg, transparent, var(--gold), var(--cyan), var(--gold), transparent);
      margin: 10px auto 0; border-radius: 2px;
      animation: barExpand 1s ease-out forwards 1.6s;
      box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(255,215,0,0.4);
    }
    @keyframes barExpand { to { width: 100%; } }
    .result-sub {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      color: rgba(200,240,255,0.55);
      letter-spacing: 2px;
      margin-top: 0.8rem;
      font-weight: 600;
    }

    /* BUILD GRID */
    .build {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 2.5rem;
      margin: 0 auto 4rem;
      max-width: 1300px;
      opacity: 0;
      animation: revealUp 1.2s ease-out forwards 1.0s;
    }

    .build-item {
      position: relative;
      background: rgba(8,12,35,0.8);
      border: 2px solid rgba(0,255,245,0.35);
      border-radius: 22px;
      padding: 2rem 1.5rem;
      width: clamp(240px, 28vw, 310px);
      box-shadow: 0 20px 70px rgba(0,0,0,0.7), inset 0 0 30px rgba(0,255,245,0.06);
      backdrop-filter: blur(8px);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      overflow: hidden;
    }
    .build-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0,255,245,0.07), transparent 60%);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.4s;
    }
    .build-item:hover::before { opacity: 1; }
    .build-item:hover {
      transform: translateY(-16px) scale(1.04);
      box-shadow: 0 40px 120px rgba(255,215,0,0.4), 0 0 60px rgba(0,255,245,0.3);
      border-color: var(--gold);
    }

    .build-item img {
      width: 100%;
      border-radius: 14px;
      margin-bottom: 1.2rem;
      box-shadow: 0 0 30px rgba(0,255,245,0.3);
    }

    .build-item-type {
      font-size: 0.68rem;
      letter-spacing: 3px;
      color: rgba(0,255,245,0.5);
      text-transform: uppercase;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .build-item h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.1rem, 2.5vw, 1.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, var(--cyan), var(--gold));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.4rem;
    }

    .build-item .rarity-tag {
      display: inline-block;
      padding: 4px 14px;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      border: 1px solid currentColor;
    }
    .rarity-tag.Common    { color: #aaa; border-color: rgba(170,170,170,0.4); background: rgba(170,170,170,0.08); }
    .rarity-tag.Rare      { color: #5bc4ff; border-color: rgba(91,196,255,0.4); background: rgba(91,196,255,0.08); }
    .rarity-tag.Epic      { color: var(--purple); border-color: rgba(168,85,255,0.4); background: rgba(168,85,255,0.08); }
    .rarity-tag.Legendary { color: var(--gold); border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.08); }
    .rarity-tag.Mythic    { color: #ff4500; border-color: rgba(255,69,0,0.4); background: rgba(255,69,0,0.08); }

    /* EMPTY STATE */
    .empty-state {
      font-size: clamp(1.3rem, 3.5vw, 2rem);
      color: rgba(200,240,255,0.5);
      padding: 3rem;
      font-style: italic;
    }

    /* BACK BUTTON */
    .btn-wrap {
      opacity: 0;
      animation: revealUp 1.2s ease-out forwards 1.3s;
    }
    .back-btn {
      position: relative;
      display: inline-block;
      padding: clamp(16px,3vw,22px) clamp(50px,10vw,120px);
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.9rem);
      font-weight: 900;
      letter-spacing: 3px;
      color: #030714;
      background: linear-gradient(90deg, #ffb300, #ffe066, #ffd700, #ffb300);
      background-size: 300% 100%;
      border: none; border-radius: 999px;
      cursor: pointer;
      box-shadow: 0 0 50px rgba(255,215,0,0.7), 0 0 120px rgba(255,215,0,0.25);
      transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.4s;
      animation: btnGlow 3.5s ease-in-out infinite;
      overflow: hidden;
    }
    @keyframes btnGlow {
      0%,100% { box-shadow: 0 0 50px rgba(255,215,0,0.7), 0 0 120px rgba(255,215,0,0.25); }
      50%     { box-shadow: 0 0 90px rgba(255,215,0,1),   0 0 200px rgba(255,215,0,0.45); }
    }
    .back-btn::before {
      content: '';
      position: absolute; top:0; left:-100%; width:60%; height:100%;
      background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
      animation: btnSweep 4s ease-in-out infinite;
    }
    @keyframes btnSweep {
      0%,100% { left:-100%; opacity:0.6; }
      50%     { left:150%;  opacity:1; }
    }
    .back-btn:hover {
      transform: translateY(-12px) scale(1.06);
      box-shadow: 0 0 100px rgba(255,215,0,1), 0 20px 60px rgba(255,215,0,0.4);
    }

    /* FLOATING RUNES */
    .rune {
      position: fixed; font-family: 'Orbitron', sans-serif;
      font-size: 0.85rem; font-weight: 900; letter-spacing: 2px;
      color: rgba(0,255,245,0.1); pointer-events: none; z-index: 6;
      animation: runeFloat linear infinite; white-space: nowrap;
    }
    @keyframes runeFloat {
      0%   { transform: translateY(0); opacity: 0.07; }
      50%  { opacity: 0.15; }
      100% { transform: translateY(-110px); opacity: 0.03; }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      header { padding: 1rem 1.5rem; }
      .logo { font-size: clamp(1.6rem, 5.5vw, 2.2rem); letter-spacing: 3px; }
      .social-icon { font-size: 1.9rem; }
      .result-main { padding: 120px 15px 80px; }
      .build-item { width: clamp(220px, 85vw, 300px); }
      .hud-corner { display: none; }
      .rune { display: none; }
    }
  </style>
</head>
<body>

<video id="bg-video" autoplay loop muted playsinline>
  <source src="assets/videos/fire-sparks.mp4" type="video/mp4">
</video>

<canvas id="grid-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<div class="bg-glow"></div>
<div class="scanlines"></div>
<div class="vignette"></div>

<div class="hud-corner hud-tl"></div>
<div class="hud-corner hud-tr"></div>
<div class="hud-corner hud-bl"></div>
<div class="hud-corner hud-br"></div>

<div class="rune" style="left:8%;  top:68%; animation-duration:15s;">MLBB • RANK • MVP</div>
<div class="rune" style="left:68%; top:60%; animation-duration:19s; animation-delay:3s">LEGENDARY • MYTHIC</div>
<div class="rune" style="left:20%; top:78%; animation-duration:13s; animation-delay:6s">MOBAHIROSHI</div>

<header>
  <a href="index.html" style="text-decoration:none;">
    <div class="logo">MOBAHIROSHI</div>
  </a>
  <div class="social-icons">
    <a href="https://www.youtube.com/@Mobahiroshi" target="_blank" class="social-icon"><i class="fab fa-youtube"></i></a>
    <a href="https://t.me/mobahiroshi" target="_blank" class="social-icon"><i class="fab fa-telegram-plane"></i></a>
    <a href="https://www.instagram.com/mobahiroshi" target="_blank" class="social-icon"><i class="fab fa-instagram"></i></a>
  </div>
</header>

<main class="result-main">
  <div class="result-title-wrap">
    <h1 class="result-title">ТВОЙ ИТОГОВЫЙ БИЛД</h1>
    <div class="title-bar"></div>
    <p class="result-sub">Это твоя судьба на этот матч</p>
  </div>

  <div class="build" id="buildContainer"></div>

  <div class="btn-wrap">
    <button class="back-btn" onclick="location.href='cases.html'">Вернуться к кейсам</button>
  </div>
</main>

<script>
/* PERSPECTIVE GRID */
(function() {
  const c = document.getElementById('grid-canvas');
  const ctx = c.getContext('2d');
  function resize() { c.width = innerWidth; c.height = innerHeight; draw(); }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    const w = c.width, h = c.height;
    const horizon = h * 0.55, vp = { x: w/2, y: horizon };
    const cols = 18, rows = 12, bottom = h + 40, spread = w * 1.4;
    ctx.strokeStyle = 'rgba(0,220,255,0.2)'; ctx.lineWidth = 0.8;
    for (let i = 0; i <= cols; i++) {
      const bx = (w/2 - spread/2) + (spread/cols)*i;
      ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(bx, bottom); ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      const t = j/rows, ease = t*t;
      const y = horizon + (bottom - horizon)*ease;
      const xl = vp.x + (-spread/2)*ease, xr = vp.x + (spread/2)*ease;
      ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
    }
    const grad = ctx.createLinearGradient(0,0,0,h);
    grad.addColorStop(0,'rgba(3,7,20,1)'); grad.addColorStop(0.45,'rgba(3,7,20,0)');
    ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
  }
  window.addEventListener('resize', resize); resize();
})();

/* PARTICLES */
(function() {
  const c = document.getElementById('particle-canvas');
  const ctx = c.getContext('2d');
  let W, H, mouse = { x: -9999, y: -9999 };
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  resize(); window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  const COUNT = 65;
  const pts = Array.from({length:COUNT},()=>({
    x:Math.random()*innerWidth, y:Math.random()*innerHeight,
    vx:(Math.random()-.5)*.4, vy:-(Math.random()*.5+.1),
    size:Math.random()*1.8+.4, life:Math.random(), maxLife:.6+Math.random()*.4,
    color:Math.random()<.5?'0,255,245':'255,215,0'
  }));
  function loop() {
    ctx.clearRect(0,0,W,H);
    if(mouse.x>0){
      const g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,110);
      g.addColorStop(0,'rgba(0,255,245,0.06)'); g.addColorStop(1,'transparent');
      ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
    }
    pts.forEach(p=>{
      const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){const f=(110-d)/110; p.vx+=(dx/d)*f*.5; p.vy+=(dy/d)*f*.5;}
      p.vx*=.97; p.vy*=.97; p.x+=p.vx; p.y+=p.vy; p.life-=.003;
      if(p.life<=0||p.y<-10){
        p.x=Math.random()*W; p.y=H+10;
        p.vx=(Math.random()-.5)*.4; p.vy=-(Math.random()*.5+.1);
        p.life=p.maxLife; p.color=Math.random()<.5?'0,255,245':'255,215,0';
      }
      const a=(p.life/p.maxLife)*.7;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.fillStyle=`rgba(${p.color},${a})`; ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* BUILD DATA */
const wins = {
  heroes:  JSON.parse(localStorage.getItem('win_heroes')  || '{}'),
  spells:  JSON.parse(localStorage.getItem('win_spells')  || '{}'),
  lanes:   JSON.parse(localStorage.getItem('win_lanes')   || '{}'),
  emblems: JSON.parse(localStorage.getItem('win_emblems') || '{}')
};

const container = document.getElementById('buildContainer');
const categoryLabels = { heroes: 'Герой', spells: 'Спелл', lanes: 'Лейн', emblems: 'Эмблема' };

const hasAny = Object.values(wins).some(w => w.name);

if (!hasAny) {
  container.innerHTML = '<p class="empty-state">Сначала открой хотя бы один кейс!</p>';
} else {
  Object.entries(wins).forEach(([key, data]) => {
    if (!data.name) return;
    const div = document.createElement('div');
    div.className = 'build-item';
    div.innerHTML = `
      <img src="${data.img}" alt="${data.name}" onerror="this.src='https://placehold.co/280x280/0a0f28/00fff5?text=${encodeURIComponent(data.name.substring(0,8))}'">
      <div class="build-item-type">${categoryLabels[key] || key}</div>
      <h3>${data.name}</h3>
      <span class="rarity-tag ${data.rarity}">${data.rarity}</span>
    `;
    container.appendChild(div);
  });
}

document.body.classList.add('loaded');
document.addEventListener('click', () => {
  document.querySelectorAll('video').forEach(v => { if(v.paused) v.play().catch(()=>{}); });
}, { once: true });
</script>
</body>
</html>
