<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Открытие кейса — MOBAHIROSHI</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

    <style>
        :root {
            --cyan:   #00fff5;
            --gold:   #ffd700;
            --purple: #a855ff;
            --orange-red: #ff4500;
            --dark:   #030714;
            --glow-c: rgba(0,255,245,0.8);
            --glow-g: rgba(255,215,0,0.8);
        }

        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

        body {
            min-height: 100dvh;
            overflow-x: hidden;
            background: var(--dark);
            color: #e0ffff;
            font-family: 'Exo 2', sans-serif;
            opacity: 0;
            transition: opacity 0.9s ease;
            text-align: center;
        }
        body.loaded { opacity: 1; }

        /* VIDEO BG */
        #bg-video {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            opacity: 0.1; z-index: 0;
            pointer-events: none;
            animation: bgScale 25s ease-in-out infinite alternate;
        }
        @keyframes bgScale { from { transform: scale(1.05); } to { transform: scale(1.18); } }

        #grid-canvas {
            position: fixed; inset: 0; z-index: 1; pointer-events: none; opacity: 0.2;
        }
        #particle-canvas {
            position: fixed; inset: 0; z-index: 2; pointer-events: none;
        }

        .bg-glow {
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse 80% 55% at 50% 0%, rgba(0,255,245,0.18) 0%, transparent 65%),
                radial-gradient(ellipse 60% 40% at 50% 100%, rgba(168,85,255,0.12) 0%, transparent 60%);
            pointer-events: none; z-index: 3;
        }
        .scanlines {
            position: fixed; inset: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px);
            pointer-events: none; z-index: 4;
        }
        .vignette {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
            pointer-events: none; z-index: 5;
        }

        /* HUD CORNERS */
        .hud-corner {
            position: fixed; width: 80px; height: 80px;
            z-index: 50; pointer-events: none;
            opacity: 0; animation: hudFade 1s ease-out forwards 1.5s;
        }
        @keyframes hudFade { to { opacity: 1; } }
        .hud-corner::before, .hud-corner::after {
            content: ""; position: absolute;
            background: var(--cyan); box-shadow: 0 0 10px var(--cyan);
        }
        .hud-corner::before { width: 2px; height: 30px; }
        .hud-corner::after  { width: 30px; height: 2px; }
        .hud-tl { top:16px; left:16px; }
        .hud-tl::before { top:0; left:0; } .hud-tl::after { top:0; left:0; }
        .hud-tr { top:16px; right:16px; transform: scaleX(-1); }
        .hud-tr::before { top:0; left:0; } .hud-tr::after { top:0; left:0; }
        .hud-bl { bottom:16px; left:16px; transform: scaleY(-1); }
        .hud-bl::before { top:0; left:0; } .hud-bl::after { top:0; left:0; }
        .hud-br { bottom:16px; right:16px; transform: scale(-1); }
        .hud-br::before { top:0; left:0; } .hud-br::after { top:0; left:0; }

        /* HEROES */
        .heroes-bg {
            position: fixed; inset: 0;
            pointer-events: none; z-index: 6;
        }
        .hero-bg {
            position: absolute; bottom: -8%;
            width: clamp(160px, 22vw, 300px);
            object-fit: contain;
            filter: drop-shadow(0 60px 130px var(--glow-c)) brightness(1.15);
            opacity: 0;
            animation: heroReveal 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
        }
        .hero-left { left: -4%; animation-delay: 0.4s;
            filter: drop-shadow(0 60px 130px rgba(0,255,245,0.45)) brightness(1.15); }
        .hero-right { right: -4%; animation-delay: 0.7s;
            filter: drop-shadow(0 60px 130px rgba(168,85,255,0.45)) brightness(1.15); }
        @keyframes heroReveal {
            from { opacity: 0; transform: translateY(50px); }
            to   { opacity: 0.8; transform: translateY(0); }
        }

        /* HEADER */
        header {
            position: fixed; top: 0; width: 100%;
            background: rgba(3,7,20,0.88); backdrop-filter: blur(14px);
            padding: 1.2rem 3rem;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 100; border-bottom: 1px solid rgba(0,255,245,0.2);
        }
        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 5vw, 3rem);
            font-weight: 900; letter-spacing: 5px;
            background: linear-gradient(90deg, #ffae00, #fffde0, #ffd700, #ffae00);
            background-size: 300%;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: logoFlow 7s linear infinite;
        }
        @keyframes logoFlow { 0% { background-position: 0%; } 100% { background-position: 300%; } }
        .social-icons { display: flex; gap: 2rem; }
        .social-icon {
            font-size: 2.2rem; color: var(--cyan);
            transition: all 0.4s ease; text-shadow: 0 0 18px var(--glow-c);
        }
        .social-icon:hover {
            transform: translateY(-10px) scale(1.35) rotate(12deg);
            color: var(--gold); text-shadow: 0 0 35px var(--glow-g);
        }

        /* MAIN */
        .open-main {
            position: relative; z-index: 20;
            padding: 150px 20px 100px;
        }

        /* TITLE */
        .case-title-wrap {
            opacity: 0;
            transform: translateY(36px);
            animation: revealUp 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.5s;
            margin-bottom: 3rem;
        }
        @keyframes revealUp { to { opacity: 1; transform: translateY(0); } }
        h1#caseTitle {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2.6rem, 8vw, 5rem);
            font-weight: 900;
            background: linear-gradient(90deg, #ffae00 0%, #fffde0 45%, #ffd700 55%, #ffae00 100%);
            background-size: 300%;
            -webkit-background-clip: text; background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleShine 10s linear infinite 1s;
            letter-spacing: 2px;
        }
        @keyframes titleShine { 0% { background-position: 0%; } 100% { background-position: 300%; } }
        .title-bar {
            height: 3px; width: 0;
            background: linear-gradient(90deg, transparent, var(--gold), var(--cyan), var(--gold), transparent);
            margin: 10px auto 0; border-radius: 2px;
            animation: barExpand 1s ease-out forwards 1.6s;
            box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(255,215,0,0.4);
        }
        @keyframes barExpand { to { width: 100%; } }

        /* ROULETTE WRAPPER */
        .roulette-wrapper {
            max-width: 1200px;
            margin: 0 auto 3.5rem;
            background: rgba(8,12,35,0.8);
            border: 2px solid rgba(0,255,245,0.35);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            box-shadow: 0 20px 70px rgba(0,0,0,0.75), inset 0 0 40px rgba(0,255,245,0.1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(8px);
            opacity: 0;
            animation: revealUp 1.2s ease-out forwards 0.8s;
        }
        .roulette-wrapper::before {
            content: '';
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 50% 0%, rgba(0,255,245,0.07), transparent 60%);
            pointer-events: none;
        }

        .roulette {
            display: flex;
            gap: 24px;
            transition: transform 8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        .roulette img {
            width: 240px; height: 240px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 20px rgba(0,255,245,0.3);
            transition: box-shadow 0.3s;
        }

        /* CENTER LINE — gold + animated */
        .center-line {
            position: absolute;
            left: 50%; top: 0;
            width: 4px; height: 100%;
            background: linear-gradient(to bottom, transparent, var(--gold), var(--orange-red), var(--gold), transparent);
            transform: translateX(-50%);
            box-shadow: 0 0 30px var(--gold), 0 0 55px rgba(255,69,0,0.5);
            z-index: 10;
            animation: lineGlow 2s ease-in-out infinite;
        }
        @keyframes lineGlow {
            0%,100% { box-shadow: 0 0 30px var(--gold), 0 0 55px rgba(255,69,0,0.4); }
            50%     { box-shadow: 0 0 60px var(--gold), 0 0 100px rgba(255,69,0,0.7); }
        }

        /* OPEN BUTTON */
        .btn-wrap {
            opacity: 0;
            animation: revealUp 1.2s ease-out forwards 1.0s;
            margin-bottom: 1rem;
        }
        .open-btn {
            position: relative;
            padding: clamp(18px,3.5vw,24px) clamp(60px,12vw,140px);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.4rem, 3.5vw, 2.2rem);
            font-weight: 900;
            letter-spacing: 3px;
            color: #030714;
            background: linear-gradient(90deg, #ffb300, #ffe066, #ffd700, #ffb300);
            background-size: 300% 100%;
            border: none; border-radius: 999px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255,215,0,0.7), 0 0 100px rgba(255,215,0,0.25);
            transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.4s;
            animation: btnGlow 3.5s ease-in-out infinite;
            overflow: hidden;
        }
        @keyframes btnGlow {
            0%,100% { box-shadow: 0 0 50px rgba(255,215,0,0.7), 0 0 100px rgba(255,215,0,0.25); }
            50%     { box-shadow: 0 0 90px rgba(255,215,0,1),   0 0 180px rgba(255,215,0,0.45); }
        }
        .open-btn::before {
            content: '';
            position: absolute; top:0; left:-100%; width:60%; height:100%;
            background: linear-gradient(110deg, transparent 0%, rgba(255,255,255,0.45) 50%, transparent 100%);
            animation: btnSweep 4s ease-in-out infinite;
        }
        @keyframes btnSweep {
            0%,100% { left:-100%; opacity:0.6; }
            50%     { left:150%;  opacity:1; }
        }
        .open-btn:hover {
            transform: translateY(-12px) scale(1.06);
            box-shadow: 0 0 100px rgba(255,215,0,1), 0 20px 60px rgba(255,215,0,0.4);
        }
        .open-btn:disabled {
            opacity: 0.7; cursor: not-allowed;
            transform: none !important;
        }

        /* WINNER SECTION */
        .winner-section {
            margin-top: 4rem;
            opacity: 0;
            transform: scale(0.75) translateY(40px);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }
        .winner-section.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        /* WINNER TITLE */
        .winner-label {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 2.5vw, 1.4rem);
            font-weight: 700;
            letter-spacing: 4px;
            color: rgba(0,255,245,0.55);
            text-transform: uppercase;
            margin-bottom: 0.5rem;
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .choice {
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .choice img {
            max-width: clamp(200px, 26vw, 300px);
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(0,255,245,0.5), inset 0 0 25px rgba(255,215,0,0.15);
            transition: all 0.5s;
        }
        .choice:hover {
            transform: translateY(-18px) scale(1.08);
        }
        .choice.selected img {
            box-shadow: 0 0 100px rgba(255,215,0,0.9), 0 0 180px rgba(255,69,0,0.6);
            transform: scale(1.1);
        }

        .winner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 6vw, 3.8rem);
            font-weight: 900;
            background: linear-gradient(90deg, var(--gold), var(--cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0.5rem 0;
            opacity: 0;
            transform: scale(0.5) translateY(30px);
            animation: epicRevealName 1.5s ease-out forwards 0.5s;
        }
        @keyframes epicRevealName {
            0%   { opacity: 0; transform: scale(0.5) translateY(30px); }
            60%  { opacity: 1; transform: scale(1.12) translateY(-14px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .rarity-badge {
            display: inline-block;
            padding: 6px 20px;
            border-radius: 999px;
            font-size: 0.78rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            border: 1.5px solid currentColor;
            margin-bottom: 1.5rem;
        }
        .rarity-badge.Common    { color: #aaa; border-color: rgba(170,170,170,0.4); background: rgba(170,170,170,0.08); }
        .rarity-badge.Rare      { color: #5bc4ff; border-color: rgba(91,196,255,0.4); background: rgba(91,196,255,0.08); }
        .rarity-badge.Epic      { color: var(--purple); border-color: rgba(168,85,255,0.4); background: rgba(168,85,255,0.08); }
        .rarity-badge.Legendary { color: var(--gold); border-color: rgba(255,215,0,0.4); background: rgba(255,215,0,0.08); }
        .rarity-badge.Mythic    { color: var(--orange-red); border-color: rgba(255,69,0,0.4); background: rgba(255,69,0,0.08); }

        /* NEXT / RESULT BUTTONS */
        .action-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            justify-content: center;
        }
        .next-btn, .result-btn {
            position: relative;
            padding: clamp(16px,3vw,22px) clamp(50px,10vw,120px);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            font-weight: 900;
            letter-spacing: 2px;
            border: none; border-radius: 999px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
            overflow: hidden;
        }
        .next-btn {
            background: linear-gradient(90deg, #00c6ff, #007bff);
            color: #fff;
            box-shadow: 0 0 50px rgba(0,198,255,0.6);
        }
        .next-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 90px rgba(0,198,255,1);
        }
        .result-btn {
            background: linear-gradient(90deg, #ffb300, #ffe066, #ffd700, #ffb300);
            background-size: 300% 100%;
            color: #030714;
            box-shadow: 0 0 50px rgba(255,215,0,0.6);
            animation: btnGlow 3.5s ease-in-out infinite;
        }
        .result-btn:hover {
            transform: translateY(-10px) scale(1.05);
            box-shadow: 0 0 90px rgba(255,215,0,1);
        }

        /* NEON PARTICLES (win effect) */
        .neon-particle {
            position: fixed;
            width: 8px; height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: neonFall 4s linear forwards;
        }
        @keyframes neonFall {
            0%   { transform: translateY(-100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(100vh) scale(0); opacity: 0; }
        }

        /* FLOATING RUNES */
        .rune {
            position: fixed; font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; font-weight: 900; letter-spacing: 2px;
            color: rgba(0,255,245,0.1); pointer-events: none; z-index: 7;
            animation: runeFloat linear infinite; white-space: nowrap;
        }
        @keyframes runeFloat {
            0%   { transform: translateY(0); opacity: 0.07; }
            50%  { opacity: 0.14; }
            100% { transform: translateY(-110px); opacity: 0.03; }
        }

        /* MOBILE */
        @media (max-width: 900px) {
            header { padding: 1rem 1.5rem; }
            .logo { font-size: clamp(1.6rem, 5.5vw, 2.2rem); letter-spacing: 3px; }
            .social-icon { font-size: 1.9rem; }
            .hero-bg { width: clamp(140px, 35vw, 220px); opacity: 0.6 !important; }
            .hero-left { left: -14%; }
            .hero-right { right: -14%; }
            .open-main { padding: 120px 12px 70px; }
            .roulette-wrapper { padding: 1.5rem 0.8rem; border-radius: 18px; }
            .roulette { gap: 14px; }
            .roulette img { width: 160px; height: 160px; }
            .choices { gap: 1.5rem; }
            .choice img { max-width: clamp(160px, 42vw, 220px); }
            .hud-corner { display: none; }
            .rune { display: none; }
        }
        @media (max-width: 480px) {
            .logo { font-size: 1.5rem; }
            .roulette img { width: 130px; height: 130px; }
            .open-btn { padding: 14px 40px; font-size: 1.3rem; }
        }
    </style>
</head>

<script>
/* PERSPECTIVE GRID */
(function() {
    const c = document.getElementById('grid-canvas');
    const ctx = c.getContext('2d');
    function resize() { c.width = innerWidth; c.height = innerHeight; draw(); }
    function draw() {
        ctx.clearRect(0, 0, c.width, c.height);
        const w = c.width, h = c.height;
        const horizon = h * 0.55, vp = { x: w/2, y: horizon };
        const cols = 18, rows = 12, bottom = h + 40, spread = w * 1.4;
        ctx.strokeStyle = 'rgba(0,220,255,0.18)'; ctx.lineWidth = 0.8;
        for (let i = 0; i <= cols; i++) {
            const bx = (w/2 - spread/2) + (spread/cols)*i;
            ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(bx, bottom); ctx.stroke();
        }
        for (let j = 0; j <= rows; j++) {
            const t = j/rows, ease = t*t;
            const y = horizon + (bottom - horizon)*ease;
            const xl = vp.x + (-spread/2)*ease, xr = vp.x + (spread/2)*ease;
            ctx.beginPath(); ctx.moveTo(xl, y); ctx.lineTo(xr, y); ctx.stroke();
        }
        const grad = ctx.createLinearGradient(0,0,0,h);
        grad.addColorStop(0,'rgba(3,7,20,1)'); grad.addColorStop(0.45,'rgba(3,7,20,0)');
        ctx.fillStyle = grad; ctx.fillRect(0,0,w,h);
    }
    window.addEventListener('resize', resize); resize();
})();

/* PARTICLES */
(function() {
    const c = document.getElementById('particle-canvas');
    const ctx = c.getContext('2d');
    let W, H, mouse = { x: -9999, y: -9999 };
    function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
    resize(); window.addEventListener('resize', resize);
    window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
    const COUNT = 60;
    const pts = Array.from({length:COUNT},()=>({
        x:Math.random()*innerWidth, y:Math.random()*innerHeight,
        vx:(Math.random()-.5)*.4, vy:-(Math.random()*.5+.1),
        size:Math.random()*1.8+.4, life:Math.random(), maxLife:.6+Math.random()*.4,
        color:Math.random()<.5?'0,255,245':'255,215,0'
    }));
    function loop() {
        ctx.clearRect(0,0,W,H);
        if(mouse.x>0){
            const g=ctx.createRadialGradient(mouse.x,mouse.y,0,mouse.x,mouse.y,110);
            g.addColorStop(0,'rgba(0,255,245,0.06)'); g.addColorStop(1,'transparent');
            ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
        }
        pts.forEach(p=>{
            const dx=p.x-mouse.x, dy=p.y-mouse.y, d=Math.sqrt(dx*dx+dy*dy);
            if(d<110){const f=(110-d)/110; p.vx+=(dx/d)*f*.5; p.vy+=(dy/d)*f*.5;}
            p.vx*=.97; p.vy*=.97; p.x+=p.vx; p.y+=p.vy; p.life-=.003;
            if(p.life<=0||p.y<-10){
                p.x=Math.random()*W; p.y=H+10;
                p.vx=(Math.random()-.5)*.4; p.vy=-(Math.random()*.5+.1);
                p.life=p.maxLife; p.color=Math.random()<.5?'0,255,245':'255,215,0';
            }
            const a=(p.life/p.maxLife)*.7;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
            ctx.fillStyle=`rgba(${p.color},${a})`; ctx.fill();
        });
        requestAnimationFrame(loop);
    }
    loop();
})();

const DUPLICATES = 8;

function generateRoulette() {
    roulette.innerHTML = '';
    for (let i = 0; i < DUPLICATES; i++) {
        items.forEach(item => {
            const img = document.createElement('img');
            img.src = item.img;
            img.alt = item.name;
            img.onerror = () => {
                img.src = `https://placehold.co/240x240/0a0f28/00fff5?text=${encodeURIComponent(item.name.substring(0,8))}`;
            };
            roulette.appendChild(img);
        });
    }
}
generateRoulette();

/* WIN PARTICLES */
function spawnWinParticles() {
    const colors = ['#ffd700','#ff4500','#00fff5','#a855ff','#ff69b4'];
    for (let i = 0; i < 40; i++) {
        setTimeout(() => {
            const p = document.createElement('div');
            p.className = 'neon-particle';
            p.style.cssText = `
                left:${10 + Math.random()*80}%;
                top:-10px;
                background:${colors[Math.floor(Math.random()*colors.length)]};
                box-shadow:0 0 8px currentColor;
                animation-duration:${2 + Math.random()*3}s;
                animation-delay:${Math.random()*0.5}s;
                width:${4+Math.random()*8}px;
                height:${4+Math.random()*8}px;
            `;
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 5000);
        }, i * 60);
    }
}

btn.addEventListener('click', () => {
    btn.disabled = true;
    btn.textContent = 'КРУТИТСЯ...';

    choicesContainer.innerHTML = '';
    winnerName.style.display = 'none';
    rarityBadge.style.display = 'none';
    nextBtn.style.display = 'none';
    buildBtn.style.display = 'none';
    winnerSection.classList.remove('visible');

    spinSound.currentTime = 0;
    spinSound.play().catch(()=>{});

    items = [...baseItems];
    const winnerIndex = Math.floor(Math.random() * items.length);
    const winner = items[winnerIndex];

    generateRoulette();

    const centerCopy = Math.floor(DUPLICATES / 2);
    const targetPosition = centerCopy * items.length + winnerIndex;
    const wrapper = document.querySelector('.roulette-wrapper');
    const viewportCenter = wrapper.offsetWidth / 2;
    const imageHalf = ITEM_WIDTH / 2;
    const finalOffset = targetPosition * ITEM_WIDTH - (viewportCenter - imageHalf);

    roulette.style.transition = 'transform 8s cubic-bezier(0.16, 1, 0.3, 1)';
    roulette.style.transform = `translateX(-${finalOffset}px)`;

    setTimeout(() => {

        if (caseType === 'heroes') {
            const leftIndex  = (winnerIndex - 1 + items.length) % items.length;
            const rightIndex = (winnerIndex + 1) % items.length;
            const winners = [items[leftIndex], items[winnerIndex], items[rightIndex]];

            choicesContainer.innerHTML = '';
            winners.forEach(hero => {
                const choiceDiv = document.createElement('div');
                choiceDiv.className = 'choice';
                const img = document.createElement('img');
                img.src = hero.img; img.alt = hero.name;
                choiceDiv.appendChild(img);
                choiceDiv.onclick = () => {
                    document.querySelectorAll('.choice').forEach(el => el.style.display='none');
                    choiceDiv.style.display = 'block';
                    choiceDiv.classList.add('selected');
                    winnerName.textContent = hero.name;
                    winnerName.style.display = 'block';
                    rarityBadge.textContent = hero.rarity;
                    rarityBadge.className = `rarity-badge ${hero.rarity}`;
                    rarityBadge.style.display = 'inline-block';
                    localStorage.setItem(`win_${caseType}`, JSON.stringify(hero));
                    winSound.currentTime = 0; winSound.play().catch(()=>{});
                    spawnWinParticles();
                };
                choicesContainer.appendChild(choiceDiv);
            });
        } else {
            choicesContainer.innerHTML = '';
            const img = document.createElement('img');
            img.src = winner.img; img.alt = winner.name;
            img.style.cssText = 'max-width:280px;border-radius:20px;box-shadow:0 0 60px rgba(0,255,245,0.5);';
            choicesContainer.appendChild(img);
            winnerName.textContent = winner.name;
            winnerName.style.display = 'block';
            rarityBadge.textContent = winner.rarity;
            rarityBadge.className = `rarity-badge ${winner.rarity}`;
            rarityBadge.style.display = 'inline-block';
            localStorage.setItem(`win_${caseType}`, JSON.stringify(winner));
            winSound.currentTime = 0; winSound.play().catch(()=>{});
            spawnWinParticles();
        }

        winnerSection.classList.add('visible');
        btn.disabled = false;
        btn.textContent = 'ОТКРЫТЬ ЕЩЁ РАЗ';

        if (nextCase) {
            nextBtn.textContent = `Следующий кейс →`;
            nextBtn.style.display = 'inline-block';
            nextBtn.onclick = () => { window.location.href = `open.html?case=${nextCase}`; };
        } else {
            buildBtn.style.display = 'inline-block';
            buildBtn.onclick = () => { window.location.href = 'result.html'; };
        }

    }, 8500);
});
