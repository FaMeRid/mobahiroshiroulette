    <style>
        :root {
            --neon-cyan: #00fff5;
            --gold: #ffd700;
            --orange-red: #ff4500;
            --deep-dark: #030714;
            --text-glow: #e0ffff;
            --shadow-neon: rgba(0, 255, 245, 0.8);
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            margin: 0;
            background: var(--deep-dark);
            color: var(--text-glow);
            font-family: 'Exo 2', sans-serif;
            min-height: 100vh;
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        #bg-particles {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -10;
            opacity: 0.18;
            pointer-events: none;
        }

        .bg-glow, .glow-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -5;
        }

        .bg-glow {
            background: radial-gradient(ellipse at 50% 20%, rgba(0,255,245,0.28) 0%, transparent 65%);
        }

        .glow-bg {
            background: radial-gradient(circle at 30% 30%, rgba(255,215,0,0.12), transparent 50%),
                        radial-gradient(circle at 70% 70%, rgba(255,0,0,0.1), transparent 60%);
        }

        .heroes-bg {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: -2;
        }

        .hero-bg {
            position: absolute;
            bottom: -10%;
            width: clamp(180px, 25vw, 320px);
            object-fit: contain;
            filter: drop-shadow(0 80px 160px var(--shadow-neon)) brightness(1.2);
            opacity: 0.75;
        }

        .hero-left  { left: -5%; }
        .hero-right { right: -5%; }

       header {
  position: fixed;
  top: 0;
  width: 100%;
  background: rgba(3,7,20,0.88);           /* чуть плотнее, как на главной */
  backdrop-filter: blur(14px);
  padding: 1.2rem 3rem;                    /* больше воздуха по бокам */
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  border-bottom: 1px solid rgba(0,255,245,0.2);
}

.logo {
  font-family: 'Orbitron', sans-serif;
  font-size: clamp(2.4rem, 6.5vw, 3.6rem);  /* как на странице выбора */
  font-weight: 900;
  color: var(--gold);
  text-shadow: 0 0 35px var(--gold);
  letter-spacing: 5px;
}

.social-icons {
  display: flex;
  gap: 2.2rem;                             /* чуть шире, чем было */
}

.social-icon {
  font-size: 2.8rem;                       /* был 2.6rem — можно чуть больше */
  color: var(--neon-cyan);
  transition: all 0.5s ease;
  text-shadow: 0 0 20px var(--shadow-neon);
}

.social-icon:hover {
  transform: translateY(-12px) scale(1.4) rotate(15deg);
  color: var(--gold);
  text-shadow: 0 0 40px var(--gold);
}
        .open-main {
            padding: 140px 20px 80px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 5.5rem);
            background: linear-gradient(90deg, #ffd700, #fffacd, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255,215,0,0.7);
            margin-bottom: 2.5rem;
            letter-spacing: 2px;
        }

        .roulette-wrapper {
            max-width: 1200px;
            margin: 0 auto 4rem;
            background: rgba(10,15,40,0.75);
            border: 2px solid rgba(0,255,245,0.4);
            border-radius: 24px;
            padding: 2.5rem 1.5rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.7), inset 0 0 40px rgba(0,255,245,0.15);
            position: relative;
            overflow: hidden;
        }

        .roulette {
            display: flex;
            gap: 24px;
            transition: transform 8s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        .roulette img {
            width: 240px;
            height: 240px;
            object-fit: contain;
            border-radius: 16px;
            box-shadow: 0 0 25px rgba(0,255,245,0.4);
        }

        .center-line {
            position: absolute;
            left: 50%;
            top: 0;
            width: 6px;
            height: 100%;
            background: linear-gradient(to bottom, #ffd700, #ff4500, #ffd700);
            transform: translateX(-50%);
            box-shadow: 0 0 35px #ffd700, 0 0 60px #ff4500;
            z-index: 10;
        }

        .open-btn {
            padding: 20px 140px;
            font-size: 2.3rem;
            font-weight: 900;
            color: #000;
            background: linear-gradient(90deg, #ffd700, #ffeb3b, #ffd700);
            background-size: 200% 100%;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(255,215,0,0.7);
            transition: all 0.4s;
            animation: shine-btn 3s linear infinite;
        }

        .open-btn:hover {
            transform: translateY(-6px) scale(1.05);
            box-shadow: 0 0 90px rgba(255,215,0,1);
        }

        @keyframes shine-btn {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .winner-section {
            margin-top: 4rem;
            opacity: 0;
            transform: scale(0.7);
            transition: all 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .winner-section.visible {
            opacity: 1;
            transform: scale(1);
        }

        .choices {
            display: flex;
            justify-content: center;
            gap: 2.5rem;
            margin-bottom: 2rem;
            perspective: 1000px;
        }

        .choice {
            cursor: pointer;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
        }

        .choice img {
            max-width: 300px;
            border-radius: 24px;
            box-shadow: 0 0 60px rgba(0,255,245,0.6), inset 0 0 30px rgba(255,215,0,0.3);
            transition: all 0.6s;
        }

        .choice:hover {
            transform: translateY(-20px) rotateY(10deg) scale(1.1);
        }

        .choice.selected img {
            box-shadow: 0 0 120px rgba(255,215,0,0.9), 0 0 200px rgba(255,69,0,0.7);
            transform: scale(1.15) rotateY(0deg);
        }

        .winner-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-shadow: 0 0 40px rgba(255,215,0,0.9);
            margin: 1rem 0;
            opacity: 0;
            transform: scale(0.5);
            animation: epic-reveal-name 1.5s ease-out forwards 0.5s;
        }

        @keyframes epic-reveal-name {
            0% { opacity: 0; transform: scale(0.5) translateY(50px); }
            60% { opacity: 1; transform: scale(1.2) translateY(-20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .winner-section.visible .winner-name {
            animation: pulse-glow-name 2s infinite alternate;
        }

        @keyframes pulse-glow-name {
            0% { text-shadow: 0 0 40px rgba(255,215,0,0.9); }
            100% { text-shadow: 0 0 80px rgba(255,69,0,1); }
        }

        .neon-particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            animation: neon-fall 4s linear forwards;
        }

        @keyframes neon-fall {
            0% { transform: translateY(-100vh) scale(0.5); opacity: 1; }
            100% { transform: translateY(100vh) scale(0); opacity: 0; }
        }

        .next-btn, .result-btn {
            padding: 20px 140px;
            font-size: 2.3rem;
            margin-top: 2rem;
            border: none;
            border-radius: 60px;
            cursor: pointer;
            box-shadow: 0 0 50px rgba(0,255,245,0.6);
        }

        .next-btn {
            background: linear-gradient(90deg, #00fff5, #007bff);
            color: #000;
        }

        .result-btn {
            background: linear-gradient(90deg, #ff4500, #ffd700);
            color: #000;
        }

font-size:1.8rem;
}

    function generateRoulette() {
      roulette.innerHTML = '';
      for (let i = 0; i < DUPLICATES; i++) {
        items.forEach(item => {
          const img = document.createElement('img');
          img.src = item.img;
          img.alt = item.name;
          img.onerror = () => {
  img.src = `https://placehold.co/240x240/333/fff/png?text=${encodeURIComponent(item.name.substring(0,8))}`;
};
          roulette.appendChild(img);
        });
      }
    }

const centerCopy = Math.floor(DUPLICATES / 2);
const targetPosition = centerCopy * items.length + winnerIndex;

const wrapper = document.querySelector('.roulette-wrapper');
const wrapperWidth = wrapper.offsetWidth;

const viewportCenter = wrapperWidth / 2;
const imageHalf = ITEM_WIDTH / 2;

const finalOffset = targetPosition * ITEM_WIDTH - (viewportCenter - imageHalf);

roulette.style.transition = 'transform 8s cubic-bezier(0.16, 1, 0.3, 1)';
roulette.style.transform = `translateX(-${finalOffset}px)`;

items[middleIndex],
items[rightIndex]
];

};

choicesContainer.appendChild(choiceDiv);

});

            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
