<style>

body{

background:
radial-gradient(circle at 20% 30%, rgba(0,255,255,0.12), transparent 40%),
radial-gradient(circle at 80% 70%, rgba(255,215,0,0.12), transparent 40%),
linear-gradient(160deg,#030714,#050d22);

font-family:Orbitron;
color:#e0ffff;
text-align:center;

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

}

/* заголовок */

h1{

font-size:60px;
color:#ffd700;
text-shadow:0 0 30px gold;

}

/* карточка героя */

.heroCard{

background:#0b0f1d;

padding:40px;
border-radius:20px;

box-shadow:
0 0 30px gold,
0 0 60px rgba(255,215,0,0.3);

}

#heroImage{

width:320px;
border-radius:16px;

box-shadow:
0 0 30px rgba(255,215,0,0.5);

transition:all 1s;

}

/* кнопка */

button{

margin-top:20px;

padding:15px 40px;

font-size:22px;
font-family:Orbitron;

border:none;
border-radius:12px;

background:linear-gradient(145deg,#ffd700,#ffae00);

color:black;

cursor:pointer;

box-shadow:0 0 20px gold;

transition:0.3s;

}

button:hover{

transform:scale(1.05);

box-shadow:
0 0 40px gold;

}

/* таймер */

#timer{

font-size:40px;
margin-top:20px;
color:#00fff5;

}

/* ответ */

#answer{

font-size:50px;
color:gold;
margin-top:20px;

opacity:0;
transition:opacity 1s;

}

.show{

opacity:1;

}

</style>
</head>

let timerInterval

function startGame(){

const hero=heroes[Math.floor(Math.random()*heroes.length)]

const img=document.getElementById("heroImage")

img.src=hero.img

img.style.filter="brightness(0)"

document.getElementById("answer").classList.remove("show")
document.getElementById("answer").innerText=""

let time=15

document.getElementById("timer").innerText=time

timerInterval=setInterval(()=>{

time--

document.getElementById("timer").innerText=time

if(time<=0){

clearInterval(timerInterval)

img.style.filter="none"

const answer=document.getElementById("answer")

answer.innerText="Answer: "+hero.name
answer.classList.add("show")

}

},1000)

}
