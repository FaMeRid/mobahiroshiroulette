<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Выберите кейс для открытия в MOBAHIROSHI — MLBB Heroes, Battle Spells, Lanes или Emblems."/>
  <title>Выбор — MOBAHIROSHI</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

  <style>
    :root {
      --cyan:   #00fff5;
      --gold:   #ffd700;
      --purple: #a855ff;
      --orange-red: #ff4500;
      --dark:   #030714;
      --glow-c: rgba(0,255,245,0.8);
      --glow-g: rgba(255,215,0,0.8);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior: smooth; }

    body {
      min-height: 100dvh;
      overflow-x: hidden;
      background: var(--dark);
      color: #e0ffff;
      font-family: 'Exo 2', sans-serif;
      opacity: 0;
      transition: opacity 0.9s ease;
      position: relative;
    }
    body.loaded { opacity: 1; }

    /* VIDEO BG */
    #bg-video {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0.1;
      z-index: 0;
      pointer-events: none;
      animation: bgScale 25s ease-in-out infinite alternate;
    }
    @keyframes bgScale {
      from { transform: scale(1.05); }
      to   { transform: scale(1.18); }
    }

    /* GRID CANVAS */
    #grid-canvas {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      opacity: 0.22;
    }

    /* PARTICLE CANVAS */
    #particle-canvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
    }

    /* OVERLAYS */
    .bg-glow {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 55% at 50% 0%, rgba(0,255,245,0.18) 0%, transparent 65%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(168,85,255,0.12) 0%, transparent 60%);
      pointer-events: none;
      z-index: 3;
    }
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.06) 3px, rgba(0,0,0,0.06) 4px
      );
      pointer-events: none;
      z-index: 4;
    }
    .vignette {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
      z-index: 5;
    }

    /* HUD CORNERS */
    .hud-corner {
      position: fixed;
      width: 80px; height: 80px;
      z-index: 50;
      pointer-events: none;
      opacity: 0;
      animation: hudFade 1s ease-out forwards 1.5s;
    }
    @keyframes hudFade { to { opacity: 1; } }
    .hud-corner::before, .hud-corner::after {
      content: "";
      position: absolute;
      background: var(--cyan);
      box-shadow: 0 0 10px var(--cyan);
    }
    .hud-corner::before { width: 2px; height: 30px; }
    .hud-corner::after  { width: 30px; height: 2px; }
    .hud-tl { top:16px; left:16px; }
    .hud-tl::before { top:0; left:0; }
    .hud-tl::after  { top:0; left:0; }
    .hud-tr { top:16px; right:16px; transform: scaleX(-1); }
    .hud-tr::before { top:0; left:0; }
    .hud-tr::after  { top:0; left:0; }
    .hud-bl { bottom:16px; left:16px; transform: scaleY(-1); }
    .hud-bl::before { top:0; left:0; }
    .hud-bl::after  { top:0; left:0; }
    .hud-br { bottom:16px; right:16px; transform: scale(-1); }
    .hud-br::before { top:0; left:0; }
    .hud-br::after  { top:0; left:0; }

    /* HEROES */
    .heroes {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }
    .hero {
      position: absolute;
      bottom: 0;
      width: clamp(260px, 36vw, 480px);
      height: auto;
      object-fit: contain;
      opacity: 0;
      animation: heroReveal 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-left {
      left: -2%;
      animation-delay: 0.3s;
      filter: drop-shadow(0 0 40px rgba(0,255,245,0.5)) brightness(1.2);
    }
    .hero-right {
      right: -2%;
      animation-delay: 0.6s;
      filter: drop-shadow(0 0 40px rgba(168,85,255,0.5)) brightness(1.2);
    }
    @keyframes heroReveal {
      from { opacity: 0; transform: translateY(60px); }
      to   { opacity: 0.92; transform: translateY(0); }
    }
    .hero-aura {
      position: absolute;
      bottom: 0;
      width: clamp(260px, 36vw, 480px);
      height: 60%;
      pointer-events: none;
      opacity: 0;
      animation: heroReveal 2.4s cubic-bezier(0.16,1,0.3,1) forwards;
    }
    .hero-aura-left  { left:-2%; animation-delay:0.3s; background: radial-gradient(ellipse at 50% 100%, rgba(0,255,245,0.2), transparent 70%); }
    .hero-aura-right { right:-2%; animation-delay:0.6s; background: radial-gradient(ellipse at 50% 100%, rgba(168,85,255,0.2), transparent 70%); }

    /* HEADER */
    header {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(3,7,20,0.88);
      backdrop-filter: blur(14px);
      padding: 1.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 100;
      border-bottom: 1px solid rgba(0,255,245,0.2);
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(2rem, 5.5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 5px;
      background: linear-gradient(90deg, #ffae00, #fffde0, #ffd700, #ffae00);
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: logoFlow 7s linear infinite;
    }
    @keyframes logoFlow {
      0%   { background-position: 0%; }
      100% { background-position: 300%; }
    }
    .social-icons { display: flex; gap: 2rem; }
    .social-icon {
      font-size: 2.4rem;
      color: var(--cyan);
      transition: all 0.4s ease;
      text-shadow: 0 0 18px var(--glow-c);
    }
    .social-icon:hover {
      transform: translateY(-10px) scale(1.35) rotate(12deg);
      color: var(--gold);
      text-shadow: 0 0 35px var(--glow-g);
    }

    /* MAIN */
    main.case-main {
      padding: 160px 20px 120px;
      position: relative;
      z-index: 20;
    }

    /* PAGE TITLE */
    .case-title-wrap {
      text-align: center;
      margin-bottom: 5rem;
      opacity: 0;
      transform: translateY(36px);
      animation: revealUp 1.4s cubic-bezier(0.16,1,0.3,1) forwards 0.6s;
    }
    @keyframes revealUp {
      to { opacity: 1; transform: translateY(0); }
    }
    h2.case-title {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(3.2rem, 9vw, 6.5rem);
      font-weight: 900;
      background: linear-gradient(90deg, #ffae00 0%, #fffde0 45%, #ffd700 55%, #ff4500 80%, #ffae00 100%);
      background-size: 400%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: titleShine 10s linear infinite 1s;
      position: relative;
      display: inline-block;
      letter-spacing: 4px;
    }
    @keyframes titleShine {
      0%   { background-position: 0%; }
      100% { background-position: 400%; }
    }
    .title-bar {
      height: 3px;
      width: 0;
      background: linear-gradient(90deg, transparent, var(--gold), var(--cyan), var(--gold), transparent);
      margin: 10px auto 0;
      border-radius: 2px;
      animation: barExpand 1s ease-out forwards 1.8s;
      box-shadow: 0 0 12px var(--gold), 0 0 24px rgba(255,215,0,0.4);
    }
    @keyframes barExpand { to { width: 100%; } }

    /* CARDS GRID */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 3rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .case-card {
      background: rgba(8,12,35,0.75);
      border: 2px solid rgba(0,255,245,0.3);
      border-radius: 24px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 16px 60px rgba(0,0,0,0.75);
      position: relative;
      opacity: 0;
      transform: translateY(80px) rotateX(15deg) scale(0.94);
      animation: cardReveal 1.2s ease-out forwards;
      backdrop-filter: blur(8px);
    }
    .case-card:nth-child(1) { animation-delay: 0.7s; }
    .case-card:nth-child(2) { animation-delay: 0.95s; }
    .case-card:nth-child(3) { animation-delay: 1.2s; }
    .case-card:nth-child(4) { animation-delay: 1.45s; }

    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0) rotateX(0deg) scale(1); }
    }

    .case-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(0,255,245,0.08) 0%, transparent 60%);
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity 0.5s;
    }
    .case-card:hover::before { opacity: 1; }

    .case-card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,69,0,0.18) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
      z-index: 1;
    }
    .case-card:hover::after { opacity: 1; }

    .case-card:hover {
      transform: translateY(-28px) scale(1.06);
      box-shadow: 0 50px 140px rgba(255,69,0,0.6), 0 0 90px rgba(0,255,245,0.4);
      border-color: var(--orange-red);
    }

    .case-card-img-wrap {
      position: relative;
      overflow: hidden;
    }
    .case-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      transition: transform 0.7s ease;
      display: block;
    }
    .case-card:hover img {
      transform: scale(1.14);
    }

    .case-card-body {
      padding: 1.8rem 2rem;
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }

    .case-card-name {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(1.6rem, 3.5vw, 2.2rem);
      font-weight: 900;
      background: linear-gradient(90deg, var(--cyan), var(--gold), var(--orange-red));
      background-size: 300%;
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: textShimmer 6s linear infinite;
      text-align: center;
      letter-spacing: 2px;
    }
    @keyframes textShimmer {
      0%   { background-position: 0%; }
      100% { background-position: 300%; }
    }

    .case-card-tag {
      font-size: 0.72rem;
      letter-spacing: 3px;
      color: rgba(0,255,245,0.5);
      font-weight: 700;
      text-transform: uppercase;
    }

    /* FLOATING RUNES */
    .rune {
      position: fixed;
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(0.65rem, 1.3vw, 0.95rem);
      font-weight: 900;
      letter-spacing: 2px;
      color: rgba(0,255,245,0.1);
      pointer-events: none;
      z-index: 6;
      animation: runeFloat linear infinite;
      white-space: nowrap;
    }
    @keyframes runeFloat {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.07; }
      50%  { opacity: 0.16; }
      100% { transform: translateY(-110px) rotate(7deg); opacity: 0.03; }
    }

    /* MOBILE */
    @media (max-width: 1024px) {
      .case-grid { gap: 2.5rem; }
    }
    @media (max-width: 900px) {
      header { padding: 1rem 1.5rem; }
      .logo { font-size: clamp(1.8rem, 6vw, 2.6rem); letter-spacing: 3px; }
      .social-icons { gap: 1.2rem; }
      .social-icon { font-size: 2rem; }
      .hero { width: clamp(200px, 52vw, 320px); opacity: 0.55 !important; }
      .hero-left { left: -16%; }
      .hero-right { right: -16%; }
      main.case-main { padding: 130px 15px 80px; }
      h2.case-title { font-size: clamp(2.6rem, 11vw, 4.2rem); }
      .case-grid { grid-template-columns: 1fr; gap: 1.8rem; max-width: 500px; }
      .case-card img { height: 200px; }
      .hud-corner { display: none; }
      .rune { display: none; }
    }
    @media (max-width: 480px) {
      .logo { font-size: 1.6rem; }
      .social-icon { font-size: 1.8rem; }
      .case-card img { height: 170px; }
      .hero { width: 240px; opacity: 0.45 !important; }
    }
  </style>
</head>

<script>
/* PERSPECTIVE GRID */
(function() {
  const c = document.getElementById('grid-canvas');
  const ctx = c.getContext('2d');
  function resize() { c.width = innerWidth; c.height = innerHeight; draw(); }
  function draw() {
    ctx.clearRect(0, 0, c.width, c.height);
    const w = c.width, h = c.height;
    const horizon = h * 0.55;
    const vp = { x: w/2, y: horizon };
    const cols = 18, rows = 12;
    const bottom = h + 40;
    const spread = w * 1.4;
    ctx.strokeStyle = 'rgba(0,220,255,0.2)';
    ctx.lineWidth = 0.8;
    for (let i = 0; i <= cols; i++) {
      const bx = (w/2 - spread/2) + (spread / cols) * i;
      ctx.beginPath(); ctx.moveTo(vp.x, vp.y); ctx.lineTo(bx, bottom); ctx.stroke();
    }
    for (let j = 0; j <= rows; j++) {
      const t = j / rows;
      const ease = t * t;
      const y = horizon + (bottom - horizon) * ease;
      const xLeft  = vp.x + ((-spread/2) * ease);
      const xRight = vp.x + ((spread/2)  * ease);
      ctx.beginPath(); ctx.moveTo(xLeft, y); ctx.lineTo(xRight, y); ctx.stroke();
    }
    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(3,7,20,1)');
    grad.addColorStop(0.45, 'rgba(3,7,20,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
  }
  window.addEventListener('resize', resize);
  resize();
})();

/* PARTICLES */
(function() {
  const c = document.getElementById('particle-canvas');
  const ctx = c.getContext('2d');
  let W, H, mouse = { x: -9999, y: -9999 };
  function resize() { W = c.width = innerWidth; H = c.height = innerHeight; }
  resize();
  window.addEventListener('resize', resize);
  window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
  const COUNT = 70;
  const particles = Array.from({ length: COUNT }, () => ({
    x: Math.random() * innerWidth,
    y: Math.random() * innerHeight,
    vx: (Math.random()-0.5)*0.4,
    vy: -(Math.random()*0.5+0.1),
    size: Math.random()*1.8+0.4,
    life: Math.random(),
    maxLife: 0.6+Math.random()*0.4,
    color: Math.random() < 0.5 ? '0,255,245' : '255,215,0'
  }));
  function loop() {
    ctx.clearRect(0, 0, W, H);
    if (mouse.x > 0) {
      const g = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, 110);
      g.addColorStop(0, 'rgba(0,255,245,0.06)');
      g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
    particles.forEach(p => {
      const dx = p.x - mouse.x, dy = p.y - mouse.y;
      const dist = Math.sqrt(dx*dx+dy*dy);
      if (dist < 110) {
        const force = (110-dist)/110;
        p.vx += (dx/dist)*force*0.55;
        p.vy += (dy/dist)*force*0.55;
      }
      p.vx *= 0.97; p.vy *= 0.97;
      p.x += p.vx; p.y += p.vy;
      p.life -= 0.003;
      if (p.life <= 0 || p.y < -10) {
        p.x = Math.random()*W; p.y = H + 10;
        p.vx = (Math.random()-0.5)*0.4;
        p.vy = -(Math.random()*0.5+0.1);
        p.life = p.maxLife;
        p.color = Math.random()<0.5?'0,255,245':'255,215,0';
      }
      const a = (p.life / p.maxLife)*0.7;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = `rgba(${p.color},${a})`;
      ctx.fill();
    });
    requestAnimationFrame(loop);
  }
  loop();
})();

/* CARD CLICKS + HOVER BURST */
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('.case-card').forEach(card => {
    card.addEventListener('click', () => {
      const caseType = card.getAttribute('data-case');
      if (caseType) window.location.href = `open.html?case=${caseType}`;
    });
    card.addEventListener('mouseenter', () => {
      for (let i = 0; i < 16; i++) {
        const p = document.createElement('div');
        p.style.cssText = `
          position:absolute;width:7px;height:7px;
          background:${['#ffd700','#ff4500','#00fff5','#a855ff'][Math.floor(Math.random()*4)]};
          border-radius:50%;
          left:${Math.random()*100}%;top:${Math.random()*100}%;
          pointer-events:none;z-index:20;
          animation:particleBurst 1.2s forwards;
        `;
        card.appendChild(p);
        setTimeout(() => p.remove(), 1200);
      }
    });
  });
});

/* PARALLAX HEROES */
if (window.innerWidth > 900) {
  const left  = document.querySelector('.hero-left');
  const right = document.querySelector('.hero-right');
  document.addEventListener('mousemove', e => {
    const x = (window.innerWidth/2  - e.clientX) / 65;
    const y = (window.innerHeight/2 - e.clientY) / 65;
    if (left)  left.style.transform  = `translate(${x}px, ${y}px)`;
    if (right) right.style.transform = `translate(${-x}px, ${-y}px)`;
  });
}

document.body.classList.add('loaded');
document.addEventListener('click', () => {
  document.querySelectorAll('video').forEach(v => { if (v.paused) v.play().catch(()=>{}); });
}, { once: true });
</script>

<style>
@keyframes particleBurst {
  0%   { transform: translate(0,0) scale(0.6); opacity: 1; }
  100% { transform: translate(calc((var(--r,50) - 50) * 2.5vw), calc((var(--r,50) - 50) * -2.5vh)) scale(0); opacity: 0; }
}
</style>
